<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MALIK2</title>
    <style>
        :root { --pink: #fbcce7; --bg: #050505; }
        body { background: var(--bg); color: var(--pink); font-family: 'Consolas', monospace; margin: 0; overflow: hidden; }
        
        #game-area { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a050d 0%, #050505 100%); visibility: hidden; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; align-items: center; justify-content: center;
        }

        #collector { 
            position: absolute; bottom: 60px; width: 140px; height: 12px; 
            background: var(--pink); box-shadow: 0 0 40px var(--pink); 
            border-radius: 20px; transform: translateX(-50%); z-index: 10;
        }

        /* NEW: Perfect Heart Styling */
        .heart-container {
            position: absolute; width: 60px; height: 60px;
            perspective: 1000px;
            filter: drop-shadow(0 0 15px var(--pink));
        }
        
        .crystal-svg {
            width: 100%; height: 100%;
            fill: var(--pink);
            stroke: #fff;
            stroke-width: 1;
            animation: crystalRotate 3s infinite linear, shimmer 2s infinite ease-in-out;
        }

        @keyframes crystalRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 15px var(--pink)); }
            50% { filter: brightness(1.5) drop-shadow(0 0 25px #fff); }
        }

        .fragment {
            position: absolute; width: 8px; height: 8px; background: var(--pink);
            border-radius: 2px; pointer-events: none; border: 1px solid #fff;
        }

        #ui { position: fixed; top: 40px; width: 100%; text-align: center; z-index: 20; }
        .bar-wrap { width: 300px; height: 8px; background: #222; margin: 15px auto; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #fill { width: 0%; height: 100%; background: var(--pink); box-shadow: 0 0 20px var(--pink); transition: 0.4s; }

        /* WIN SCREEN - LOCKED */
        #win-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 100; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        .win-content { animation: scaleUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        @keyframes scaleUp { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .glow-text { font-size: 3rem; letter-spacing: 15px; color: #fff; text-shadow: 0 0 30px var(--pink); margin-bottom: 10px; }
        button { 
            margin-top: 40px; padding: 15px 50px; border: 1px solid var(--pink); 
            background: transparent; color: var(--pink); font-family: 'Consolas'; 
            cursor: pointer; letter-spacing: 4px; transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover { background: var(--pink); color: #000; box-shadow: 0 0 50px var(--pink); }
    </style>
</head>
<body>

<div id="start-overlay">
    <button onclick="startGame()">INITIALIZE SYSTEM</button>
</div>

<div id="game-area">
    <div id="ui">
        <div style="letter-spacing: 8px; font-weight: bold;">FRAGMENT_SYNC: <span id="percent">0</span>%</div>
        <div class="bar-wrap"><div id="fill"></div></div>
    </div>
    <div id="collector"></div>
</div>

<div id="win-overlay">
    <div class="win-content">
        <div class="glow-text">SYNCHRONIZED</div>
        <p style="color: #666; letter-spacing: 3px;">ALL HEART FRAGMENTS CAPTURED.<br>FINAL PROTOCOL READY.</p>
        <button onclick="window.location.href='final.html'">EXECUTE FINAL_TRANS</button>
    </div>
</div>

<script>
    const area = document.getElementById('game-area');
    const collector = document.getElementById('collector');
    const fill = document.getElementById('fill');
    const perc = document.getElementById('percent');
    let score = 0;
    let audioCtx;

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-overlay').style.display = 'none';
        area.style.visibility = 'visible';
        spawn();
    }

    function playShatterSound() {
        for(let i=0; i<5; i++) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200 + (Math.random() * 1000), audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function playWinSound() {
        const notes = [440, 554, 659, 880];
        notes.forEach((f, i) => {
            setTimeout(() => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.value = f;
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 1);
            }, i * 150);
        });
    }

    window.addEventListener('mousemove', (e) => {
        collector.style.left = e.clientX + 'px';
    });

    function shatter(x, y) {
        for (let i = 0; i < 15; i++) {
            const frag = document.createElement('div');
            frag.className = 'fragment';
            frag.style.left = x + 'px';
            frag.style.top = y + 'px';
            area.appendChild(frag);
            const angle = Math.random() * Math.PI * 2;
            const velocity = 3 + Math.random() * 6;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            let op = 1;
            let move = setInterval(() => {
                frag.style.left = parseFloat(frag.style.left) + vx + 'px';
                frag.style.top = parseFloat(frag.style.top) + vy + 'px';
                op -= 0.04;
                frag.style.opacity = op;
                if (op <= 0) { frag.remove(); clearInterval(move); }
            }, 16);
        }
    }

    function spawn() {
        if (score >= 100) return;
        const cont = document.createElement('div');
        cont.className = 'heart-container';
        
        // Using a perfect SVG path for the heart
        cont.innerHTML = `
            <svg class="crystal-svg" viewBox="0 0 32 32">
                <path d="M16 28.5L14.1 26.7C7.2 20.4 2.5 16.2 2.5 11C2.5 6.6 6 3.1 10.4 3.1C12.9 3.1 15.3 4.3 16.8 6.1C18.3 4.3 20.7 3.1 23.2 3.1C27.6 3.1 31.1 6.6 31.1 11C31.1 16.2 26.4 20.4 19.5 26.7L16 28.5Z" />
            </svg>
        `;
        
        cont.style.left = Math.random() * (window.innerWidth - 60) + 'px';
        cont.style.top = "-60px";
        area.appendChild(cont);

        let t = -60;
        let s = 6 + (score / 15);

        let loop = setInterval(() => {
            t += s;
            cont.style.top = t + 'px';
            let cr = collector.getBoundingClientRect();
            let hr = cont.getBoundingClientRect();

            if (hr.bottom >= cr.top && hr.left < cr.right && hr.right > cr.left && hr.top < cr.bottom) {
                score += 10;
                perc.innerText = score;
                fill.style.width = score + "%";
                playShatterSound();
                shatter(hr.left + 30, hr.top + 30);
                cont.remove();
                clearInterval(loop);
                if (score >= 100) win();
                else setTimeout(spawn, 300);
            }
            if (t > window.innerHeight) { cont.remove(); clearInterval(loop); spawn(); }
        }, 16);
    }

    function win() {
        document.getElementById('win-overlay').style.display = 'flex';
        playWinSound();
    }
</script>
</body>
</html>
